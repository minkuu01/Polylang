# ========================
# PolyLang Configuration
# ========================
# This file contains NO SECRETS - safe to commit to Git
# Secrets are in application-local.properties (gitignored)
spring.profiles.active=local

# Server
server.port=${PORT:8080}

# PostgreSQL Database (Supabase)
# Actual values must be set in application-local.properties or via environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/polylang}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Kolkata'
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Groq API (Free - get your key at https://console.groq.com)
# Set GROQ_API_KEY in application-local.properties or as an environment variable
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# Wandbox Execution API (Public endpoint - no key needed)
wandbox.api.url=https://wandbox.org/api/compile.json
# Default compilers (adjust if needed)
wandbox.language.python=cpython-3.12.7
wandbox.language.javascript=nodejs-20.17.0
wandbox.language.java=openjdk-jdk-21+35
wandbox.language.cpp=gcc-13.2.0
wandbox.language.c=gcc-13.2.0-c

# MyMemory Translation API (Free - no key needed)
translation.api.url=https://api.mymemory.translated.net/get

# Logging
logging.level.com.polylang=INFO

# API Retry and Quota Configuration
# Supabase JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://yyaqeruenkuwlilgcbyy.supabase.co/auth/v1
# Ensure the backend matches the Supabase audience if needed (optional)
# spring.security.oauth2.resourceserver.jwt.audiences=authenticated
mymemory.email=your@email.com
groq.max.retries=3
groq.retry.delay.ms=2000
mymemory.max.retries=3
mymemory.retry.delay.ms=1000

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://yyaqeruenkuwlilgcbyy.supabase.co/auth/v1/jwks.json
