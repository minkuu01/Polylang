services:
  # Backend Spring Boot Service
  - type: web
    name: polylang-backend
    runtime: docker
    plan: free
    dockerContext: backend
    dockerFilePath: Dockerfile
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.yyaqeruenkuwlilgcbyy
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set this in Render Dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in Render Dashboard
      - key: CORS_ALLOWED_ORIGINS
        value: "*" # Update this to your Vercel URL after deployment
      - key: DB_POOL_SIZE
        value: 4 # Keep low for free tier/pooled connection
    healthCheckPath: /api/health
